<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NFL Crew League</title>
  <meta name="description" content="NFL Crew League — standings, records, rivalries and hall of fame.">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23011A36'/%3E%3Cellipse cx='32' cy='32' rx='15' ry='9' fill='%23F5C542'/%3E%3Cline x1='22' y1='32' x2='42' y2='32' stroke='%23011A36' stroke-width='2'/%3E%3Cline x1='28' y1='29' x2='28' y2='35' stroke='%23011A36' stroke-width='2'/%3E%3Cline x1='32' y1='28' x2='32' y2='36' stroke='%23011A36' stroke-width='2'/%3E%3Cline x1='36' y1='29' x2='36' y2='35' stroke='%23011A36' stroke-width='2'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23011A36'/%3E%3Cellipse cx='32' cy='32' rx='15' ry='9' fill='%23F5C542'/%3E%3C/svg%3E">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #FFFFFF;
      color: #011A36;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .site-header {
      background: #011A36;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #F5C542;
    }
    .site-header .crest { width: 28px; height: 28px; flex-shrink: 0; }
    .site-header .wordmark { color: #FFFFFF; font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
    .site-header .wordmark .accent { color: #F5C542; }

    .home-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; align-items: start; }
    .weeks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .records-sidebar { position: sticky; top: 90px; }

    .week-card, .player-tile, .champ-tile { transition: transform 0.12s ease, box-shadow 0.12s ease; }
    .week-card:hover, .player-tile:hover, .champ-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(1, 26, 54, 0.18);
    }

    .site-footer {
      max-width: 1100px; margin: 2rem auto 0; padding: 1.5rem 1rem 2rem;
      border-top: 1px solid #e5e8ec; text-align: center; color: #94a3b8; font-size: 12px;
    }
    .site-footer .accent { color: #5B9BD5; }

    @media (max-width: 768px) {
      .home-grid { grid-template-columns: 1fr; }
      .weeks-grid { grid-template-columns: 1fr; }
      .records-sidebar { position: static; order: -1; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <svg class="crest" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="64" height="64" rx="12" fill="#022a52"/>
      <ellipse cx="32" cy="32" rx="16" ry="10" fill="#F5C542"/>
      <line x1="21" y1="32" x2="43" y2="32" stroke="#011A36" stroke-width="2.5"/>
      <line x1="27" y1="28.5" x2="27" y2="35.5" stroke="#011A36" stroke-width="2.5"/>
      <line x1="32" y1="27.5" x2="32" y2="36.5" stroke="#011A36" stroke-width="2.5"/>
      <line x1="37" y1="28.5" x2="37" y2="35.5" stroke="#011A36" stroke-width="2.5"/>
    </svg>
    <span class="wordmark">NFL <span class="accent">CREW</span> LEAGUE</span>
  </header>
  <div id="app"></div>
  <footer class="site-footer">
    NFL Crew League · est. <span class="accent">2010</span> · built by Aron
  </footer>
  <script src="app.js"></script>
</body>
</html>

name: Sync Google Sheets to JSON

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:     # Manual trigger button

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch and convert Google Sheet to JSON
        run: |
          curl -o /tmp/sheet.csv "https://docs.google.com/spreadsheets/d/1OoGAkPgzE4UFEekM3XchU22RGz3fIXl-2rxYeg0zJcU/export?format=csv&gid=1006709501"
          cat /tmp/sheet.csv
      
      - name: Parse CSV and update data.json
        uses: actions/setup-python@v4
      
      - name: Run conversion script
        run: python .github/workflows/convert.py
      
      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/data.json
          git commit -m "Auto-sync from Google Sheets" || true
          git push
